name:  CI

on:
  push:
    branches:
      - main
      - master

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shoponline-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: shoponline-frontend
        run: npm ci

      - name: Run ESLint
        working-directory: shoponline-frontend
        run: npm run lint

      

      - name: Build Project
        working-directory: shoponline-frontend
        run: npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Docker Image
        working-directory: shoponline-frontend
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/shoponline-frontend:latest .

      - name: Push Frontend Docker Image
        run: |
          docker push ${{ vars.DOCKER_USERNAME }}/shoponline-frontend:latest  



 # --- BACKEND JOB (SPRING BOOT) ---
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Change to '21' if your Spring Boot app uses Java 21
          distribution: 'temurin'
          cache: 'maven' # Automatically caches your .m2 directory dependencies

      # Note: If your project uses Gradle instead of Maven, change the command below to: ./gradlew build
      - name: Build Spring Boot JAR
        working-directory: courtonline-backend
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        working-directory: courtonline-backend
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/shoponline-backend:latest .

      - name: Push Backend Docker Image
        run: |
          docker push ${{ vars.DOCKER_USERNAME }}/shoponline-backend:latest  

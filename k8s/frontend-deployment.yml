apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: shopregister
  labels: 
   app: frontend 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: dasbappa2007/shopregister-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
